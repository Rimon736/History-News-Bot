name: Historical Breaking News Bot

on:
  schedule:
    # Runs every 2 hours (e.g., 00:00, 02:00, 04:00...)
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI for testing

jobs:
  post_news:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai Pillow requests
          # Install standard core fonts for Linux so PIL can use arial.ttf
          sudo apt-get update -y
          sudo apt-get install -y ttf-mscorefonts-installer
          
      - name: Run Bot Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        run: python bot.py
        
      - name: Save Memory (Commit History)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Updated bot memory" && git push)